<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex">
  <title>⚡ OpenClaw World</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f1e;
      color: #e2e8f0;
      font-family: 'Courier New', 'Lucida Console', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top Bar ── */
    #top-bar {
      flex-shrink: 0;
      height: 44px;
      background: linear-gradient(90deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }

    #top-bar .logo {
      font-size: 16px;
      font-weight: bold;
      color: #f97316;
      text-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
      letter-spacing: 2px;
    }

    #live-badge {
      font-size: 11px;
      font-family: monospace;
      margin-left: 16px;
      color: #ef4444;
      letter-spacing: 1px;
    }

    #top-bar .logo span {
      color: #94a3b8;
      font-size: 12px;
      font-weight: normal;
      margin-left: 12px;
      letter-spacing: 1px;
    }

    #top-bar .status-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: #64748b;
    }

    #top-bar .online-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #22c55e;
      font-weight: bold;
    }

    #top-bar .online-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    .time-display {
      color: #475569;
      font-size: 11px;
    }

    /* ── Game Area ── */
    #game-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #070d1a;
      overflow: hidden;
    }

    #game-container {
      position: relative;
    }

    #game-container canvas {
      display: block;
    }

    /* ── Bottom Bar ── */
    #bottom-bar {
      flex-shrink: 0;
      height: 72px;
      background: linear-gradient(90deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      border-top: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 20px;
      z-index: 10;
    }

    .bot-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 8px 14px;
      min-width: 200px;
      transition: border-color 0.3s ease;
    }

    .bot-card:hover {
      border-color: var(--accent);
    }

    .bot-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--accent);
      position: relative;
    }

    .bot-avatar::after {
      content: '';
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      border: 1px solid #0f172a;
    }

    .bot-info {
      flex: 1;
      min-width: 0;
    }

    .bot-name {
      font-size: 11px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .bot-activity {
      font-size: 10px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      transition: color 0.3s;
    }

    /* Per-bot accent colors */
    #card-danpen { --accent: #f97316; }
    #card-mech   { --accent: #3b82f6; }
    #card-wormy  { --accent: #22c55e; }
    #card-orion  { --accent: #a855f7; }

    /* Pulse animation */
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px currentColor; }
      50% { opacity: 0.5; box-shadow: 0 0 2px currentColor; }
    }

    /* Scanline overlay on game */
    #game-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* Phase label watermark */
    #phase-label {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 9px;
      color: #1e293b;
      letter-spacing: 2px;
      z-index: 6;
    }

    /* ── Conversation Panel ── */
    #conv-panel {
      display: none;
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      max-width: calc(100vw - 32px);
      background: #0f172a;
      border: 1px solid var(--bot-color, #f97316);
      border-radius: 12px;
      padding: 20px;
      z-index: 200;
      box-shadow: 0 0 40px rgba(0,0,0,0.85), 0 0 20px rgba(0,0,0,0.5);
      font-family: 'Courier New', monospace;
    }

    #conv-panel .panel-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    #bot-face {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      border: 1px solid var(--bot-color, #f97316);
      flex-shrink: 0;
      image-rendering: pixelated;
    }

    #conv-bot-name {
      font-size: 17px;
      font-weight: bold;
      color: var(--bot-color, #f97316);
      letter-spacing: 1px;
    }

    #conv-bot-role {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    #close-conv-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: #64748b;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    #close-conv-btn:hover { color: #e2e8f0; }

    #chat-history {
      height: 180px;
      overflow-y: auto;
      margin-bottom: 12px;
      padding: 10px;
      background: #1e293b;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      scrollbar-width: thin;
      scrollbar-color: #334155 #1e293b;
    }
    #chat-history::-webkit-scrollbar { width: 4px; }
    #chat-history::-webkit-scrollbar-track { background: #1e293b; }
    #chat-history::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    #chat-input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    #chat-input:focus {
      border-color: var(--bot-color, #f97316);
    }
    #chat-input:disabled {
      opacity: 0.5;
    }

    #send-btn {
      background: var(--bot-color, #f97316);
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    #send-btn:hover { opacity: 0.9; transform: scale(1.02); }
    #send-btn:active { transform: scale(0.97); }

    #speak-toggle {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      color: #94a3b8;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      transition: border-color 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    #speak-toggle:hover { border-color: var(--bot-color, #f97316); }

    /* Click-to-talk hint label */
    #click-hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #334155;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 6;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="logo">
      ⚡ OPENCLAW WORLD
      <span>// LIVE</span>
      <span id="live-badge">○ CONNECTING...</span>
    </div>
    <div class="status-right">
      <div class="online-badge">
        <div class="online-dot"></div>
        4 bots online
      </div>
      <div class="time-display" id="clock">--:--:-- UTC</div>
    </div>
  </div>

  <!-- Game -->
  <div id="game-wrapper">
    <div id="game-container"></div>
    <div id="phase-label">v0.4.0 — LIVE</div>
    <div id="click-hint">▲ CLICK ANY BOT TO CHAT ▲</div>

    <!-- ── Conversation Panel ─────────────────────────────────────────── -->
    <div id="conv-panel">

      <div class="panel-header">
        <!-- Pixel-art face canvas: 160×160 logical pixels, displayed at 80×80 -->
        <canvas id="bot-face" width="160" height="160"></canvas>
        <div>
          <div id="conv-bot-name">BOT NAME</div>
          <div id="conv-bot-role">Role</div>
        </div>
        <button id="close-conv-btn" onclick="closeConvPanel()" title="Close">✕</button>
      </div>

      <!-- Chat history -->
      <div id="chat-history"></div>

      <!-- Input row -->
      <div class="chat-input-row">
        <input
          id="chat-input"
          type="text"
          placeholder="Talk to this bot…"
          onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="speak-toggle" onclick="toggleSpeak()" title="Toggle text-to-speech">🔊 Speak: ON</button>
        <button id="send-btn" onclick="sendMessage()">SEND</button>
      </div>

    </div>
    <!-- ── /Conversation Panel ─────────────────────────────────────────── -->

  </div>

  <!-- Bottom Status Bar -->
  <div id="bottom-bar">

    <div class="bot-card" id="card-danpen">
      <div class="bot-avatar">🔬</div>
      <div class="bot-info">
        <div class="bot-name">DAN PEN</div>
        <div class="bot-activity" id="status-danpen">Initializing...</div>
      </div>
    </div>

    <div class="bot-card" id="card-mech">
      <div class="bot-avatar">⚙️</div>
      <div class="bot-info">
        <div class="bot-name">MECH</div>
        <div class="bot-activity" id="status-mech">Initializing...</div>
      </div>
    </div>

    <div class="bot-card" id="card-wormy">
      <div class="bot-avatar">💬</div>
      <div class="bot-info">
        <div class="bot-name">WORMY</div>
        <div class="bot-activity" id="status-wormy">Initializing...</div>
      </div>
    </div>

    <div class="bot-card" id="card-orion">
      <div class="bot-avatar">📋</div>
      <div class="bot-info">
        <div class="bot-name">ORION</div>
        <div class="bot-activity" id="status-orion">Initializing...</div>
      </div>
    </div>

  </div>

  <!-- Embed mode: ?embed=1 hides top/bottom bars and fills viewport -->
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('embed') === '1') {
        document.addEventListener('DOMContentLoaded', function() {
          const topBar = document.getElementById('top-bar');
          const bottomBar = document.getElementById('bottom-bar');
          if (topBar) topBar.style.display = 'none';
          if (bottomBar) bottomBar.style.display = 'none';
          // Make game wrapper fill viewport
          const wrapper = document.getElementById('game-wrapper');
          if (wrapper) {
            wrapper.style.height = '100vh';
            wrapper.style.flex = 'unset';
          }
        });
      }
    })();
  </script>

  <!-- Live Clock -->
  <script>
    function updateClock() {
      const now = new Date();
      const hh = String(now.getUTCHours()).padStart(2, '0');
      const mm = String(now.getUTCMinutes()).padStart(2, '0');
      const ss = String(now.getUTCSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hh}:${mm}:${ss} UTC`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>

  <!-- Phaser Game -->
  <script src="src/world.js"></script>
  <!-- Phase 3: Conversation Panel + Pixel Face + LLM + TTS -->
  <script src="src/conversation.js"></script>

</body>
</html>
